aid: beatport
name: Beatport
description: >-
  Beatport is the leading online music store and streaming platform for
  electronic dance music DJs and producers, founded in 2004 and headquartered
  in Denver, Colorado. Beatport sells high-quality downloads (lossless WAV,
  AIFF, and FLAC, plus AAC) of tracks, releases, and DJ tools across more than
  150 electronic genres, and operates a subscription streaming tier — Beatport
  Streaming — that delivers catalog tracks directly into supported DJ
  applications and hardware including Pioneer DJ rekordbox, Serato DJ Pro,
  Denon DJ Engine DJ, Algoriddim djay, Virtual DJ, Traktor, and others through
  integration partners. The Beatport Group also operates Beatsource (open-
  format DJ streaming and download store), DJCity (open-format record pool),
  Beatport LINK and Beatsource LINK (in-app streaming for DJ software),
  BeatportAmp (distribution and rights management for labels, formerly
  Ampsuite), Plugin Boutique (audio software and plugin marketplace),
  Loopcloud (sample subscription for producers), Label Radar (demo submission),
  Beatport Live (live events and streaming), Beatportal (editorial and media),
  and the International Music Summit (IMS) industry conference. The company
  reports ten million registered users, eighty thousand labels, four hundred
  thousand artists, and four hundred million USD paid out to rights holders
  since launch. Beatport operates a v4 REST API at api.beatport.com governed
  by OAuth 2.0 (authorization-code grant) with an interactive Swagger-UI
  developer portal at /v4/docs/; access is gated to approved partners through
  the Beatport Partner Portal, and there is no public client-credentials tier
  for general developers. The API exposes the Beatport catalog (tracks,
  releases, artists, labels, genres, sub-genres, charts, playlists, my-beatport
  collections, holds, and DJ-oriented search filters such as BPM, key, and
  released-date) and is the same surface that powers the public beatport.com
  applications and third-party DJ-software integrations. Beatport does not
  publish a downloadable OpenAPI document, an official SDK, or a CLI; partner
  integration is brokered case-by-case through the Partner Portal and the
  business-development team.
